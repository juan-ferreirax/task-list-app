services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_NAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      network: host
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "
      until python -c \"import MySQLdb, os; MySQLdb.connect(host=os.environ['MYSQL_HOST'], user=os.environ['MYSQL_USER'], passwd=os.environ['MYSQL_PASSWORD'], db=os.environ['MYSQL_NAME'], port=int(os.environ['MYSQL_PORT']))\" 2>/dev/null;
      do echo 'Aguardando o banco de dados ficar pronto...'; sleep 2; done &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      gunicorn api.wsgi:application --bind 0.0.0.0:8000
      "

  frontend:
    build:
      context: ./frontend
      network: host
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  db_data: